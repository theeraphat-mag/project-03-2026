apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-docker-hub/backend-app:latest
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          value: "mydb"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASS
          value: "password123"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  ports:
  - port: 5000
  selector:
    app: backend
